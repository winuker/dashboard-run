name: Refrescar análisis

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GH_TOKEN }}

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
        STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
        STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        TWILIO_SID: ${{ secrets.TWILIO_SID }}
        TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
        WHATSAPP_FROM: ${{ secrets.WHATSAPP_FROM }}
        WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
      run: |
        python plan_entreno_gpt5_v2.py

    - name: Commit y push del JSON actualizado
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add dashboard_data.json
        git commit -m "Actualización automática" || echo "No hay cambios para commitear"
        git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/winuker/dashboard-run.git
        git push origin HEAD:main
